name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Determine build version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            RELEASE_TYPE="release"
          else
            BASE=$(node -p "require('./package.json').version")
            TS=$(date -u +%Y%m%d%H%M%S)
            VERSION="${BASE}-alpha-${TS}"
            RELEASE_TYPE="prerelease"
          fi
          echo "Building version: $VERSION ($RELEASE_TYPE)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"

      - name: Set version
        shell: bash
        run: npm pkg set version="${{ steps.ver.outputs.version }}"

      - name: Build and publish release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GH_TOKEN }}
        run: |
          npm pkg set build.publish[0].releaseType="${{ steps.ver.outputs.release_type }}"
          npx electron-builder --publish always

      - name: Build only (alpha builds)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npx electron-builder

      - name: Upload alpha build artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: UEE-Gun-Manager-${{ steps.ver.outputs.version }}
          path: dist/*.exe
          retention-days: 30
